    evasion:
      attacker: "accuracy"
      defender: "evasion"
      limit:
        min: 0
        max: 60

critical_setting:
  stat:
    chance:
      attacker: "critical_chance"
      defender: "critical_resist"
      limit:
        min: 10
        max: 70
    multiplier:
      attacker: "critical_damage"
      defender: "critical_damage_resist"
